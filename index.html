<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English for Nana</title>
<style>
:root { --blue: #268bd2; --bg: #fdf6e3; --text: #073642; --green: #859900; --red: #d33682; --orange: #cb4b16; }
body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
.score { display: flex; gap: 30px; margin-bottom: 15px; font-weight: bold; font-size: 24px; }
.modes { margin-bottom: 20px; display: flex; gap: 15px; }
.m-btn { padding: 15px 30px; border-radius: 25px; font-size: 22px; font-weight: bold; cursor: pointer; border: 4px solid var(--orange); background: white; color: var(--orange); }
.m-btn.active { background: var(--orange); color: white; }
.menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; max-width: 600px; }
.t-btn { background: #eee8d5; border: 3px solid var(--blue); padding: 12px 20px; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; }
.t-btn.active { background: var(--blue); color: white; }
.card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 550px; border: 8px solid var(--blue); box-sizing: border-box; text-align: center; }
#cs { color: #93a1a1; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; font-size: 20px; }
.ru { font-size: 38px; color: #586e75; margin-bottom: 30px; font-weight: bold; line-height: 1.2; }
h1 { font-size: 52px; margin: 15px 0; color: var(--blue); line-height: 1.1; }
.tr { font-size: 36px; color: #b58900; font-weight: bold; margin-bottom: 20px; background: #eee8d5; padding: 15px; border-radius: 15px; display: inline-block; }
button { cursor: pointer; border: none; border-radius: 25px; font-weight: bold; width: 100%; margin: 10px 0; padding: 30px; font-size: 34px; }
.btn-audio { background: var(--green); color: white; }
.btn-check { background: var(--orange); color: white; }
.nav { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
.btn-nav { background: var(--blue); color: white; padding: 20px; font-size: 26px; width: 48%; }
.res { display: flex; gap: 15px; margin-top: 15px; }
.btn-ok { background: var(--green); color: white; }
.btn-fail { background: var(--red); color: white; }
.hide { display: none; }
</style>
</head>
<body>

<div class="modes">
    <div id="ml" class="m-btn active" onclick="sm('learn')">УЧИТЬ</div>
    <div id="mt" class="m-btn" onclick="sm('test')">ПРОВЕРКА</div>
</div>

<div id="sa" class="score hide">
    <span style="color:var(--green)">ЗНАЮ: <span id="sok">0</span></span>
    <span style="color:var(--red)">ЗАБЫЛА: <span id="sf">0</span></span>
</div>

<div class="menu" id="mm"></div>

<div class="card">
    <div id="cs"></div>
    <div id="rt" class="ru"></div>
    <div id="aa">
        <h1 id="et"></h1>
        <div id="tt" class="tr"></div>
        <button class="btn-audio" onclick="playAudio()">ПОСЛУШАТЬ</button>
    </div>
    <button id="cb" class="btn-check hide" onclick="rev()">УЗНАТЬ ОТВЕТ</button>
    <div id="fb" class="res hide">
        <button class="btn-ok" onclick="hr(1)">ПОМНЮ</button>
        <button class="btn-fail" onclick="hr(0)">ЗАБЫЛА</button>
    </div>
    <div id="nb" class="nav">
        <button class="btn-nav" onclick="prv()">Назад</button>
        <button class="btn-nav" onclick="nxt()">Вперед</button>
    </div>
</div>

<script src="data.js"></script>

<script>
var l = [];
var i = 0;
var m = "learn";
var ok = 0;
var fa = 0;

function shuffle(array) {
    var currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

function sm(v) {
    m = v;
    document.getElementById("ml").classList.toggle("active", v === "learn");
    document.getElementById("mt").classList.toggle("active", v === "test");
    document.getElementById("sa").classList.toggle("hide", v === "learn");
    ok = 0; fa = 0; us(); i = 0; up();
}

function rev() {
    document.getElementById("aa").classList.remove("hide");
    document.getElementById("cb").classList.add("hide");
    document.getElementById("fb").classList.remove("hide");
    playAudio();
}

function hr(v) {
    if (v) { ok++; } else { fa++; }
    us(); nxt();
}

function us() {
    document.getElementById("sok").innerText = ok;
    document.getElementById("sf").innerText = fa;
}

function init() {
    if (typeof d === 'undefined') {
        alert("Ошибка: файл data.js не найден или пуст!");
        return;
    }
    var categories = ["Все"];
    for (var j = 0; j < d.length; j++) {
        if (categories.indexOf(d[j].c) === -1) { categories.push(d[j].c); }
    }
    var container = document.getElementById("mm");
    categories.forEach(function(cat) {
        var btn = document.createElement("div");
        btn.className = "t-btn";
        if (cat === "Все") { btn.className += " active"; }
        btn.innerText = cat;
        btn.onclick = function() {
            var btns = document.querySelectorAll(".t-btn");
            for (var k = 0; k < btns.length; k++) { btns[k].classList.remove("active"); }
            btn.classList.add("active");
            var filtered = [];
            if (cat === "Все") { filtered = d.slice(); } 
            else { for (var n = 0; n < d.length; n++) { if (d[n].c === cat) { filtered.push(d[n]); } } }
            l = shuffle(filtered);
            i = 0; up();
        };
        container.appendChild(btn);
    });
    l = shuffle(d.slice());
    up();
}

function up() {
    if (l.length === 0) return;
    var item = l[i];
    document.getElementById("cs").innerText = item.c;
    document.getElementById("et").innerText = item.e;
    document.getElementById("tt").innerText = "[" + item.t + "]";
    document.getElementById("rt").innerText = item.r;
    if (m === "test") {
        document.getElementById("aa").classList.add("hide");
        document.getElementById("cb").classList.remove("hide");
        document.getElementById("nb").classList.add("hide");
        document.getElementById("fb").classList.add("hide");
    } else {
        document.getElementById("aa").classList.remove("hide");
        document.getElementById("cb").classList.add("hide");
        document.getElementById("nb").classList.remove("hide");
        document.getElementById("fb").classList.add("hide");
    }
}

function playAudio() {
    var u = new SpeechSynthesisUtterance(l[i].e);
    u.lang = "en-US"; u.rate = 0.7;
    window.speechSynthesis.speak(u);
}

function nxt() { i = (i + 1) % l.length; up(); }
function prv() { i = (i - 1 + l.length) % l.length; up(); }

// Start the app after a tiny delay to ensure data.js is loaded
window.onload = init;
</script>
</body>
</html>
