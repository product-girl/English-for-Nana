<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English for Nana</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="English Nana">
    <link rel="apple-touch-icon" href="https://cdn2.thecatapi.com/images/0XYvSTLsc.jpg">

    <style>
        :root { --blue: #268bd2; --bg: #fdf6e3; --text: #073642; --green: #859900; --red: #d33682; --orange: #cb4b16; }

        /* Фиксируем экран, чтобы избежать скролла всей страницы */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            box-sizing: border-box;
        }

        /* Кнопки переключения режимов */
        .modes { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 10px; 
            flex-shrink: 0; 
        }
        .m-btn { 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            border: 3px solid var(--orange); 
            background: white; 
            color: var(--orange); 
        }
        .m-btn.active { background: var(--orange); color: white; }

        /* Меню категорий: подстраивается под ширину устройства */
        .menu { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 6px; 
            margin-bottom: 10px; 
            max-width: 800px; 
            flex-shrink: 0;
        }
        .t-btn { 
            background: #eee8d5; 
            border: 2px solid var(--blue); 
            padding: 6px 12px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .t-btn.active { background: var(--blue); color: white; }

        /* Адаптивная карточка */
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
            border: 6px solid var(--blue); 
            box-sizing: border-box; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            flex-grow: 1; 
            min-height: 0; 
            margin-bottom: 10px;
        }

        /* Прокрутка только внутри карточки, если текст не влезает */
        .content-area {
            overflow-y: auto; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #cs { color: #93a1a1; font-weight: bold; text-transform: uppercase; font-size: 14px; margin-bottom: 5px; }
        .ru { font-size: 30px; color: #586e75; font-weight: bold; line-height: 1.1; margin-bottom: 10px; }
        h1 { font-size: 40px; margin: 10px 0; color: var(--blue); line-height: 1.0; }
        .tr { font-size: 24px; color: #b58900; font-weight: bold; margin-bottom: 10px; background: #eee8d5; padding: 8px; border-radius: 10px; display: inline-block; }

        button { cursor: pointer; border: none; border-radius: 20px; font-weight: bold; width: 100%; padding: 15px; font-size: 24px; -webkit-tap-highlight-color: transparent; }
        .btn-audio { background: var(--green); color: white; margin-top: 10px; }
        .btn-check { background: var(--orange); color: white; }

        .nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; flex-shrink: 0; }
        .btn-nav { background: var(--blue); color: white; font-size: 20px; width: 48%; }

        .score { font-weight: bold; font-size: 18px; margin-bottom: 5px; flex-shrink: 0; }
        .res { display: flex; gap: 10px; margin-top: 10px; }
        .btn-ok { background: var(--green); color: white; }
        .btn-fail { background: var(--red); color: white; }
        .hide { display: none; }

        /* Увеличение шрифтов для больших экранов (iPad/Laptop) */
        @media (min-height: 700px) {
            .card { padding: 30px; }
            .ru { font-size: 38px; }
            h1 { font-size: 52px; }
            .m-btn { font-size: 20px; padding: 12px 24px; }
            .t-btn { font-size: 18px; padding: 10px 15px; }
        }
    </style>
</head>
<body>

<div class="modes">
    <div id="ml" class="m-btn active" onclick="sm('learn')">УЧИТЬ</div>
    <div id="mt" class="m-btn" onclick="sm('test')">ПРОВЕРКА</div>
</div>

<div id="sa" class="score hide">
    <span style="color:var(--green)">ЗНАЮ: <span id="sok">0</span></span>
    <span style="color:var(--red)">ЗАБЫЛА: <span id="sf">0</span></span>
</div>

<div class="menu" id="mm"></div>

<div class="card">
    <div class="content-area">
        <div id="cs"></div>
        <div id="rt" class="ru"></div>
        <div id="aa">
            <h1 id="et"></h1>
            <div id="tt" class="tr"></div>
            <button class="btn-audio" onclick="playAudio()">ПОСЛУШАТЬ</button>
        </div>
        <button id="cb" class="btn-check hide" onclick="rev()">УЗНАТЬ ОТВЕТ</button>
        <div id="fb" class="res hide">
            <button class="btn-ok" onclick="hr(1)">ПОМНЮ</button>
            <button class="btn-fail" onclick="hr(0)">ЗАБЫЛА</button>
        </div>
    </div>
    
    <div id="nb" class="nav">
        <button class="btn-nav" onclick="prv()">Назад</button>
        <button class="btn-nav" onclick="nxt()">Вперед</button>
    </div>
</div>

<script>
// Авто-загрузка данных с принудительным обновлением кэша
var script = document.createElement('script');
script.src = 'data.js?v=' + Date.now();
script.onload = function() { if (typeof d !== 'undefined') init(); };
document.head.appendChild(script);

var l = [], i = 0, m = "learn", ok = 0, fa = 0;

function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function sm(v) {
    m = v;
    document.getElementById("ml").classList.toggle("active", v === "learn");
    document.getElementById("mt").classList.toggle("active", v === "test");
    document.getElementById("sa").classList.toggle("hide", v === "learn");
    ok = 0; fa = 0; us(); i = 0; up();
}

function rev() {
    document.getElementById("aa").classList.remove("hide");
    document.getElementById("cb").classList.add("hide");
    document.getElementById("fb").classList.remove("hide");
    playAudio();
}

function hr(v) { if (v) ok++; else fa++; us(); nxt(); }
function us() { document.getElementById("sok").innerText = ok; document.getElementById("sf").innerText = fa; }

function init() {
    let cats = ["Все", ...new Set(d.map(x => x.c))];
    let container = document.getElementById("mm");
    container.innerHTML = "";
    cats.forEach(c => {
        let b = document.createElement("div");
        b.className = "t-btn" + (c === "Все" ? " active" : "");
        b.innerText = c;
        b.onclick = () => {
            document.querySelectorAll(".t-btn").forEach(x => x.classList.remove("active"));
            b.classList.add("active");
            l = shuffle(c === "Все" ? [...d] : d.filter(x => x.c === c));
            i = 0; up();
        };
        container.appendChild(b);
    });
    l = shuffle([...d]);
    up();
}

function up() {
    if (!l[i]) return;
    document.getElementById("cs").innerText = l[i].c;
    document.getElementById("et").innerText = l[i].e;
    document.getElementById("tt").innerText = "[" + l[i].t + "]";
    document.getElementById("rt").innerText = l[i].r;
    
    let isT = (m === "test");
    document.getElementById("aa").classList.toggle("hide", isT);
    document.getElementById("cb").classList.toggle("hide", !isT);
    document.getElementById("nb").classList.toggle("hide", isT);
    document.getElementById("fb").classList.add("hide");
}

function playAudio() {
    window.speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(l[i].e);
    u.lang = "en-US"; u.rate = 0.8;
    window.speechSynthesis.speak(u);
}

function nxt() { i = (i + 1) % l.length; up(); }
function prv() { i = (i - 1 + l.length) % l.length; up(); }
</script>
</body>
</html>
